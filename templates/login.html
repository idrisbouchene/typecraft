<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — TypeCraft</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="{{ url_for('index') }}" class="navbar__logo">Type<span>Craft</span></a>
  <div class="navbar__nav">
    <a href="{{ url_for('index') }}" class="navbar__link">Accueil</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Bon retour 👋</h1>
    <p class="auth-card__sub">Connectez-vous pour continuer votre progression</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash--{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="username">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="votre_pseudo" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center; margin-top:.5rem">
        Se connecter ⚡
      </button>
    </form>

    <div class="auth-switch">
      Pas encore de compte ? <a href="{{ url_for('register') }}">Créer un compte</a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
