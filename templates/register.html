<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — TypeCraft</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="{{ url_for('index') }}" class="navbar__logo">Type<span>Craft</span></a>
  <div class="navbar__nav">
    <a href="{{ url_for('index') }}" class="navbar__link">Accueil</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Créer un compte 🚀</h1>
    <p class="auth-card__sub">Rejoignez TypeCraft et commencez à taper comme un pro</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash--{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label" for="username">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="votre_pseudo" required minlength="3" maxlength="30"
               autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Adresse e-mail</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="vous@exemple.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Minimum 6 caractères" required minlength="6"
               autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirmer le mot de passe</label>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password"
               placeholder="Répétez le mot de passe" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center; margin-top:.5rem">
        Créer mon compte ✨
      </button>
    </form>

    <div class="auth-switch">
      Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
